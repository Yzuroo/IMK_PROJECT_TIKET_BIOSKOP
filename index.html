<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <title>BioskopYuk - Pemesanan Tiket</title>
  <link rel="stylesheet" href="style.css">
  <script src="qrcode.min.js"></script>
</head>
<body>
  <h1>BioskopYuk 🎬</h1>

  <h2>Data Pemesan</h2>
  <input type="text" id="nama" placeholder="Nama Anda">

  <h2>Pilih Film</h2>
  <select id="film">
    <option value="Avengers - 19:00">Avengers - 19:00</option>
    <option value="Batman - 21:00">Batman - 21:00</option>
    <option value="Spiderman - 17:00">Spiderman - 17:00</option>
  </select>

  <h2>Pilih Kursi</h2>
  <div id="kursi">
    <button onclick="pilihKursi('A1')">A1</button>
    <button onclick="pilihKursi('A2')">A2</button>
    <button onclick="pilihKursi('B1')">B1</button>
    <button onclick="pilihKursi('B2')">B2</button>
  </div>

  <h2>Detail Pesanan</h2>
  <p id="detail"></p>
  <button onclick="buatQR()">Buat QR Code Tiket</button>
  <div id="qrcode"></div>

  <script src="script.js"></script>
</body>
</html>
